services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_local
    restart: always

    ports:
      - "5678:5678"

    environment:
      GENERIC_TIMEZONE: Africa/Lagos
      TZ: Africa/Lagos

      WEBHOOK_URL: https://feature-fence-mailing-jeffrey.trycloudflare.com                    
      N8N_HOST: feature-fence-mailing-jeffrey.trycloudflare.com                     
      N8N_PROTOCOL: https
      N8N_PORT: 5678

    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
